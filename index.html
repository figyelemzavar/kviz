<!DOCTYPE html>
<html lang="hu">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-275XYFWD28"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-275XYFWD28');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvízParti</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="KvízParti - Napi agytorna">
    <meta property="og:description" content="Teszteld a tudásod minden nap frissülő kvízeinkkel!">
    <meta property="og:image" content="https://raw.githubusercontent.com/figyelemzavar/kviz/main/kvizparti.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #10b981; 
            --error: #f43f5e;
            --bg: #f0f2f5; 
            --text: #0f172a; 
            --card: #ffffff;
            --btn-bg: #eff6ff;
            --btn-border: #dbeafe;
            --lifeline-gradient: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 15px 15px;
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 15px 15px 15px; 
        }

        .logo-text {
            font-weight: 800;
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: -1px;
            display: block;
        }

        .card { 
            background: var(--card); 
            border-radius: 28px; 
            padding: 30px 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); 
            text-align: center; 
            width: 100%; 
            max-width: 440px; 
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }
        
        .slot-label {
            display: inline-block;
            background: var(--btn-bg);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            border: 1px solid var(--btn-border);
            text-transform: uppercase;
        }

        .lifeline-btn { 
            background: var(--lifeline-gradient);
            border: none;
            color: white; 
            padding: 6px 12px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .lifeline-btn:disabled { 
            background: #cbd5e1 !important; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: scale(0.95);
        }
        .lifeline-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .option-btn { 
            background: var(--btn-bg); border: 3px solid var(--btn-border); 
            padding: 18px; border-radius: 20px; font-weight: 600; cursor: pointer; 
            margin-bottom: 12px; width: 100%; font-size: 16px; transition: 0.2s;
            color: var(--text);
        }

        .correct-flash { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        .wrong-flash { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .score-pop { position: absolute; right: 25px; top: 100px; color: var(--secondary); font-weight: 800; opacity: 0; pointer-events: none; transform: translateY(0); transition: all 0.5s; font-size: 18px; }
        .score-pop.show { opacity: 1; transform: translateY(-30px); }

        .badge-img { height: 150px; width: auto; margin: 15px 0; display: inline-block; }
        .league-name { font-weight: 800; font-size: 26px; text-transform: uppercase; margin-bottom: 10px; }
        .bronz { color: #cd7f32; }
        .ezust { color: #94a3b8; }
        .arany { color: #fbbf24; }
        .gyemant { color: #22d3ee; text-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }

        .progress-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            gap: 8px; 
            flex-wrap: nowrap;
        }
        .status-pill { background: #f1f5f9; padding: 6px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; color: #64748b; border: 1px solid #e2e8f0; white-space: nowrap; transition: all 0.3s; }
        
        .bar-bg { height: 10px; background: #f1f5f9; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: 0.6s; }

        .next-quiz-info {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            font-size: 14px;
            color: #64748b;
            border: 1px dashed #cbd5e1;
        }

        .missed-offer {
            margin-top: 20px;
            padding: 15px;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            border-radius: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="start-panel" class="card">
        <div class="logo-text">KvízParti</div>
        <div id="quiz-session-name" class="slot-label">Töltés...</div>
        <p id="start-msg" style="color: #64748b; margin-bottom: 25px;">Készen állsz a 15 kérdéses kihívásra? Használd okosan a felezőt!</p>
        <button id="start-btn" class="option-btn" style="background:var(--primary); color:white; border:none;" onclick="startQuiz()">JÁTÉK INDÍTÁSA</button>
        
        <div id="start-next-info" class="next-quiz-info" style="display:none;">
            A következő kvíz kezdete: <br>
            <strong class="next-time-val" style="color: var(--primary); font-size: 18px; display: block; margin-top: 5px;">--:--</strong>
        </div>

        <div id="start-missed-container" class="missed-offer" style="display:none;">
            <p class="missed-text-val" style="margin:0 0 10px 0; font-weight:600; font-size:13px; color:#92400e;"></p>
            <button class="missed-btn-val option-btn" style="padding:10px; font-size:14px; margin-bottom:0; background:#fbbf24; border-color:#f59e0b;">Start!</button>
        </div>
    </div>

    <div id="game-panel" class="card" style="display:none;">
        <div id="score-anim" class="score-pop">+1 PONT</div>
        <div class="progress-header">
            <span class="status-pill" id="q-count">1 / 15</span>
            <button id="fifty-fifty" class="lifeline-btn" onclick="useFiftyFifty()">
                <span id="ff-count">3x</span> FELEZŐ
            </button>
            <span class="status-pill">PONT: <span id="live-score">0</span></span>
        </div>
        <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
        <h2 id="q-text" style="font-size: 22px; margin-bottom: 30px; line-height: 1.4; font-weight: 600;"></h2>
        <div id="options-box"></div>
    </div>

    <div id="result-panel" class="card" style="display:none;">
        <p id="result-msg" style="color: #64748b; font-size: 16px; margin-bottom: 20px; margin-top: 10px;">Gratulálunk a teljesítményedhez!</p>
        <div id="badge-container"><img id="badge-img" class="badge-img" src="" alt="Érem"></div>
        <div id="league-text" class="league-name"></div>
        <div style="font-size:56px; font-weight:800; color:var(--primary); line-height: 1;" id="final-p">0 / 15</div>
        
        <div id="result-missed-container" class="missed-offer" style="display:none;">
            <p class="missed-text-val" style="margin:0 0 10px 0; font-weight:600; font-size:13px; color:#92400e;"></p>
            <button class="missed-btn-val option-btn" style="padding:10px; font-size:14px; margin-bottom:0; background:#fbbf24; border-color:#f59e0b;">Start!</button>
        </div>

        <div class="next-quiz-info">
            Köszönjük a játékot! <br>
            <span>A következő kvíz kezdete:</span> <br>
            <strong class="next-time-val" style="color: var(--primary); font-size: 18px; display: block; margin-top: 5px;">--:--</strong>
        </div>
    </div>

<script>
    let quizData = [];
    let currentSlotKey = "";
    let idx = 0, score = 0, canClick = true;
    let fiftyCount = 3; 
    let fiftyUsedInCurrentQ = false; 
    const totalQ = 15;
    
    const diffColors = { "Könnyű": "#10b981", "Közepes": "#f59e0b", "Nehéz": "#ef4444" };
    const slots = [8, 10, 12, 14, 16, 18];
    
    const slotNames = {
        "08": "Reggeli kvíz", "10": "Délelőtti kvíz", "12": "Déli kvíz",
        "14": "Délutáni kvíz", "16": "Késő délutáni kvíz", "18": "Esti kvíz"
    };

    document.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'r') resetGame(); });
    function resetGame() { window.location.href = window.location.pathname; }
    function playMissed(slotId) { window.location.href = window.location.pathname + "?slot=" + slotId; }

    function getEffectiveDate() {
        const now = new Date();
        if (now.getHours() < 8) now.setDate(now.getDate() - 1);
        return now;
    }

    async function loadQuiz() {
        const btn = document.getElementById('start-btn');
        const sessionLabel = document.getElementById('quiz-session-name');
        const urlParams = new URLSearchParams(window.location.search);
        const forcedSlot = urlParams.get('slot');

        try {
            const effDate = getEffectiveDate();
            const dateStr = `${effDate.getFullYear()}-${String(effDate.getMonth() + 1).padStart(2, '0')}-${String(effDate.getDate()).padStart(2, '0')}`;
            const fileName = `data_${dateStr}.json`;

            const response = await fetch(fileName + '?v=' + Date.now());
            if (!response.ok) throw new Error("Fájl nem található");
            
            const dailyData = await response.json();
            
            let activeSlot = "";
            let nextSlotTime = "";

            const now = new Date();
            const hour = now.getHours();
            if (hour < 8) {
                nextSlotTime = "Ma 08:00";
            } else {
                let foundNext = false;
                for (let s of slots) {
                    if (s > hour) {
                        nextSlotTime = s.toString().padStart(2, '0') + ":00";
                        foundNext = true;
                        break;
                    }
                }
                if (!foundNext) nextSlotTime = "Holnap 08:00";
            }

            if (forcedSlot && dailyData.slots[forcedSlot]) {
                activeSlot = forcedSlot;
            } else {
                if (hour < 8) {
                    activeSlot = "18";
                } else {
                    for (let s of slots) {
                        if (hour >= s) {
                            activeSlot = s.toString().padStart(2, '0');
                        }
                    }
                }
            }

            currentSlotKey = `quiz_${dateStr}_${activeSlot}`;
            sessionLabel.innerText = slotNames[activeSlot] || "Napi kvíz";
            document.querySelectorAll('.next-time-val').forEach(el => el.innerText = nextSlotTime);

            let questions = dailyData.slots[activeSlot] || dailyData.slots[Object.keys(dailyData.slots)[0]];
            quizData = questions.sort((a,b) => ({"Könnyű":1, "Közepes":2, "Nehéz":3}[a.l] || 0) - ({"Könnyű":1, "Közepes":2, "Nehéz":3}[b.l] || 0));

            if (forcedSlot) {
                startQuiz();
                return;
            }

            if (localStorage.getItem(currentSlotKey)) {
                btn.disabled = true;
                btn.innerText = "EZT A KVÍZT MÁR KITÖLTÖTTED";
                btn.style.background = "#cbd5e1";
                document.getElementById('start-msg').innerText = "Várd meg a következő időpontot!";
                document.getElementById('start-next-info').style.display = 'block';
                checkMissedSlots(dailyData, dateStr, activeSlot);
            }

        } catch (e) { 
            console.error(e);
            btn.innerText = "Hiba a betöltéskor";
        }
    }

    function checkMissedSlots(dailyData, dateStr, activeSlot) {
        const hour = new Date().getHours();
        for (let s of slots) {
            let sStr = s.toString().padStart(2, '0');
            let isPast = (new Date().getHours() >= 8) ? (s <= hour) : true;
            if (isPast && sStr !== activeSlot) {
                if (!localStorage.getItem(`quiz_${dateStr}_${sStr}`) && dailyData.slots[sStr]) {
                    const containers = [document.getElementById('start-missed-container'), document.getElementById('result-missed-container')];
                    containers.forEach(c => {
                        if(!c) return;
                        c.querySelector('.missed-text-val').innerText = `Úgy látom, a ${slotNames[sStr].toLowerCase()}ról lemaradtál. Szeretnéd kitölteni?`;
                        const b = c.querySelector('.missed-btn-val');
                        b.disabled = false;
                        b.onclick = () => playMissed(sStr);
                        c.style.display = 'block';
                    });
                    return; 
                }
            }
        }
    }

    function startQuiz() {
        if(!quizData.length) return;
        document.getElementById('start-panel').style.display='none';
        document.getElementById('game-panel').style.display='block';
        renderQ();
    }

    function renderQ() {
        canClick = true;
        fiftyUsedInCurrentQ = false; 
        const q = quizData[idx];
        
        const qCountEl = document.getElementById('q-count');
        qCountEl.innerText = `${idx + 1} / ${totalQ}`;
        
        const bgCol = diffColors[q.l] || "#f1f5f9";
        qCountEl.style.backgroundColor = bgCol;
        qCountEl.style.color = "white";
        qCountEl.style.borderColor = bgCol;

        document.getElementById('live-score').innerText = score;
        document.getElementById('bar').style.width = `${((idx + 1) / totalQ) * 100}%`;
        
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        let options = [...q.o];
        if (options.length > 2) options.sort(() => Math.random() - 0.5);
        options.forEach(txt => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = txt;
            b.onclick = () => check(txt, b);
            box.appendChild(b);
        });

        updateLifelineUI();
    }

    function updateLifelineUI() {
        const ffBtn = document.getElementById('fifty-fifty');
        const ffLabel = document.getElementById('ff-count');
        ffLabel.innerText = `${fiftyCount}x`;
        if (fiftyCount <= 0 || fiftyUsedInCurrentQ) {
            ffBtn.disabled = true;
        } else {
            ffBtn.disabled = false;
        }
    }

    function useFiftyFifty() {
        if(fiftyUsedInCurrentQ || fiftyCount <= 0 || !canClick) return;
        fiftyCount--;
        fiftyUsedInCurrentQ = true;
        const q = quizData[idx];
        let wrongOptions = q.o.filter(o => o !== q.a);
        let randomWrong = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
        let remaining = [q.a, randomWrong].sort(() => Math.random() - 0.5);
        document.getElementById('options-box').innerHTML = '';
        remaining.forEach(txt => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = txt;
            b.onclick = () => check(txt, b);
            document.getElementById('options-box').appendChild(b);
        });
        updateLifelineUI();
    }

    function check(selected, btn) {
        if(!canClick) return;
        canClick = false;
        const q = quizData[idx];
        document.querySelectorAll('#options-box .option-btn').forEach(b => b.disabled = true);
        
        if(selected === q.a) {
            btn.classList.add('correct-flash');
            score++;
            document.getElementById('live-score').innerText = score;
            document.getElementById('score-anim').classList.add('show');
            setTimeout(() => document.getElementById('score-anim').classList.remove('show'), 1000);
        } else {
            btn.classList.add('wrong-flash');
            
            gtag('event', 'quiz_error', {
                'question_text': q.q + " (" + q.o.join(" vs ") + ")",
                'quiz_theme': q.theme || 'N/A',
                'user_wrong_answer': selected,
                'correct_answer': q.a,
                'difficulty': q.l
            });

            document.querySelectorAll('#options-box .option-btn').forEach(b => { 
                if(b.innerText === q.a) b.classList.add('correct-flash'); 
            });
        }
        setTimeout(() => { idx++; if(idx < totalQ) renderQ(); else finish(); }, 1500);
    }

    function finish() {
        if (currentSlotKey) localStorage.setItem(currentSlotKey, "completed");
        document.getElementById('game-panel').style.display='none';
        document.getElementById('result-panel').style.display='block';
        document.getElementById('final-p').innerText = `${score} / ${totalQ}`;
        let leagues = { Bronz: "bronze", Ezüst: "silver", Arany: "gold", Gyémánt: "diamond" };
        let league = score <= 4 ? "Bronz" : score <= 9 ? "Ezüst" : score <= 14 ? "Arany" : "Gyémánt";
        document.getElementById('league-text').innerText = league;
        document.getElementById('league-text').className = "league-name " + league.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        document.getElementById('badge-img').src = `https://raw.githubusercontent.com/figyelemzavar/kviz/main/img/${leagues[league]}.png`;
        
        const effD = getEffectiveDate();
        const dateStr = `${effD.getFullYear()}-${String(effD.getMonth()+1).padStart(2,'0')}-${String(effD.getDate()).padStart(2,'0')}`;
        
        fetch(`data_${dateStr}.json?v=` + Date.now())
            .then(r => r.json())
            .then(dailyData => {
                checkMissedSlots(dailyData, dateStr, currentSlotKey.split('_').pop());
            })
            .catch(e => console.error("Hiba a betöltéskor", e));
    }

    loadQuiz();
</script>
</body>
</html>
