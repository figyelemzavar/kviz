<!DOCTYPE html>
<html lang="hu">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-275XYFWD28"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvízParti</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kvizparti.hu/">
    <meta property="og:title" content="KvízParti - Napi agytorna mindenkinek">
    <meta property="og:description" content="Teszteld a tudásod minden nap frissülő kvízeinkkel!">
    <meta property="og:image" content="https://raw.githubusercontent.com/figyelemzavar/kviz/main/img/kvizparti.jpg">
    <meta property="og:image:width" content="1536">
    <meta property="og:image:height" content="1024">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "KvízParti",
      "operatingSystem": "Web",
      "applicationCategory": "GameApplication",
      "genre": "Quiz",
      "description": "Teszteld a tudásod minden nap frissülő kvízeinkkel! 15 kérdés, 3 nehézségi szint.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "HUF"
      }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #10b981; 
            --error: #f43f5e;
            --bg: #f0f2f5; 
            --text: #0f172a; 
            --card: #ffffff;
            --btn-bg: #eff6ff;
            --btn-border: #dbeafe;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 15px 15px;
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 15px 15px 15px; 
        }

        .logo-text {
            font-weight: 800;
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
            display: block;
        }

        .card { 
            background: var(--card); 
            border-radius: 28px; 
            padding: 30px 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.06); 
            text-align: center; 
            width: 100%; 
            max-width: 440px; 
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
        }
        
        .lifeline-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .lifeline-btn { 
            background: #fff; border: 2px solid var(--primary); color: var(--primary); 
            padding: 10px 24px; border-radius: 50px; font-weight: 800; cursor: pointer;
            transition: all 0.2s; font-size: 14px; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }
        .lifeline-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #cbd5e1; color: #cbd5e1; }

        .option-btn { 
            background: var(--btn-bg); border: 3px solid var(--btn-border); 
            padding: 18px; border-radius: 20px; font-weight: 600; cursor: pointer; 
            margin-bottom: 12px; width: 100%; font-size: 16px; transition: 0.2s;
            color: var(--text);
        }

        .correct-flash { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        .wrong-flash { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        .score-pop { position: absolute; right: 25px; top: 100px; color: var(--secondary); font-weight: 800; opacity: 0; pointer-events: none; transform: translateY(0); transition: all 0.5s; font-size: 18px; }
        .score-pop.show { opacity: 1; transform: translateY(-30px); }

        .badge-img { height: 150px; width: auto; margin: 15px 0; display: inline-block; }
        .league-name { font-weight: 800; font-size: 26px; text-transform: uppercase; margin-bottom: 10px; }
        .bronz { color: #cd7f32; }
        .ezust { color: #94a3b8; }
        .arany { color: #fbbf24; }
        .gyemant { color: #22d3ee; text-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }

        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .status-pill { background: #f1f5f9; padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; color: #64748b; border: 1px solid #e2e8f0; }
        .difficulty-pill { color: white; text-transform: uppercase; font-size: 11px; padding: 5px 10px; border-radius: 10px; }
        
        .bar-bg { height: 10px; background: #f1f5f9; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: 0.6s; }

        .next-quiz-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
            font-size: 14px;
            color: #64748b;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>

    <div id="start-panel" class="card">
        <div class="logo-text">KvízParti</div>
        <p id="start-msg" style="color: #64748b; margin-bottom: 25px;">Készen állsz a 15 kérdéses kihívásra? Használd okosan a felezőt!</p>
        <button id="start-btn" class="option-btn" style="background:var(--primary); color:white; border:none;" onclick="startQuiz()">JÁTÉK INDÍTÁSA</button>
    </div>

    <div id="game-panel" class="card" style="display:none;">
        <div id="score-anim" class="score-pop">+1 PONT</div>
        <div class="lifeline-container">
            <button id="fifty-fifty" class="lifeline-btn" onclick="useFiftyFifty()">50:50 FELEZÉS</button>
        </div>
        <div class="progress-header">
            <span class="status-pill" id="q-count">1 / 15</span>
            <span id="diff-tag" class="status-pill difficulty-pill">SZINT</span>
            <span class="status-pill">PONT: <span id="live-score">0</span></span>
        </div>
        <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
        <h2 id="q-text" style="font-size: 22px; margin-bottom: 30px; line-height: 1.4; font-weight: 600;"></h2>
        <div id="options-box"></div>
    </div>

    <div id="result-panel" class="card" style="display:none;">
        <p id="result-msg" style="color: #64748b; font-size: 16px; margin-bottom: 20px; margin-top: 10px;"></p>
        <div id="badge-container"><img id="badge-img" class="badge-img" src="" alt="Érem"></div>
        <div id="league-text" class="league-name"></div>
        <div style="font-size:56px; font-weight:800; color:var(--primary); line-height: 1;" id="final-p">0 / 15</div>
        
        <div class="next-quiz-info">
            Köszönjük a játékot! <br>
            A következő kvíz kezdete: <br>
            <strong id="next-time" style="color: var(--primary); font-size: 18px; display: block; margin-top: 5px;">--:--</strong>
        </div>
    </div>

<script>
    /* ... (A korábbi JavaScript kód változatlanul marad) ... */
    let quizData = [];
    let idx = 0, score = 0, canClick = true, fiftyUsed = false;
    const totalQ = 15;
    const colorPrimaryVar = "#4f46e9"; 
    const diffColors = { "Könnyű": "#10b981", "Közepes": "#f59e0b", "Nehéz": "#ef4444" };
    const slots = [8, 10, 12, 14, 16, 18];

    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'r') resetGame();
    });

    function resetGame() {
        window.location.reload();
    }

    async function loadQuiz() {
        const btn = document.getElementById('start-btn');
        try {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const fileName = `data_${year}-${month}-${day}.json`;

            const response = await fetch(fileName + '?v=' + Date.now());
            if (!response.ok) throw new Error("Fájl hiba: " + fileName);
            
            const encrypted = await response.text();
            const bytes = CryptoJS.AES.decrypt(encrypted, colorPrimaryVar);
            const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
            if (!decryptedText) throw new Error("Hibás titkosítás!");
            
            const dailyData = JSON.parse(decryptedText);
            const hour = now.getHours();
            
            let activeSlot = "08";
            let nextSlot = slots[0];

            for (let i = 0; i < slots.length; i++) {
                if (hour >= slots[i]) {
                    activeSlot = slots[i].toString().padStart(2, '0');
                    nextSlot = slots[i + 1] || slots[0];
                }
            }

            document.getElementById('next-time').innerText = nextSlot.toString().padStart(2, '0') + ":00";

            let questions = dailyData.slots[activeSlot];
            if (!questions) {
                const available = Object.keys(dailyData.slots);
                if (available.length > 0) questions = dailyData.slots[available[0]];
            }

            if (!questions) throw new Error("Nincsenek elérhető kérdések!");

            quizData = questions.sort((a,b) => {
                const order = {"Könnyű":1, "Közepes":2, "Nehéz":3};
                return (order[a.l] || 0) - (order[b.l] || 0);
            });

            btn.innerText = "JÁTÉK INDÍTÁSA";
            btn.disabled = false;
        } catch (e) { 
            btn.innerText = "Hiba: " + e.message;
            btn.disabled = true;
        }
    }

    function startQuiz() {
        if(!quizData.length) return;
        document.getElementById('start-panel').style.display='none';
        document.getElementById('game-panel').style.display='block';
        renderQ();
    }

    function renderQ() {
        canClick = true;
        const q = quizData[idx];
        document.getElementById('q-count').innerText = `${idx + 1} / ${totalQ}`;
        document.getElementById('live-score').innerText = score;
        document.getElementById('bar').style.width = `${((idx + 1) / totalQ) * 100}%`;
        const tag = document.getElementById('diff-tag');
        tag.innerText = q.l;
        tag.style.background = diffColors[q.l] || "#64748b";
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        let options = [...q.o];
        if (options.length > 2) {
            options.sort(() => Math.random() - 0.5);
        }

        options.forEach(txt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(txt, b);
            box.appendChild(b);
        });
        document.getElementById('fifty-fifty').disabled = fiftyUsed;
    }

    function useFiftyFifty() {
        if(fiftyUsed || !canClick) return;
        fiftyUsed = true;
        const q = quizData[idx];
        const box = document.getElementById('options-box');
        let wrong = q.o.filter(opt => opt !== q.a);
        let randomWrong = wrong[Math.floor(Math.random() * wrong.length)];
        let remainingOptions = [q.a, randomWrong]; 
        remainingOptions.sort(() => Math.random() - 0.5);
        
        box.innerHTML = '';
        remainingOptions.forEach(txt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(txt, b);
            box.appendChild(b);
        });
        document.getElementById('fifty-fifty').disabled = true;
    }

    function check(selected, btn) {
        if(!canClick) return;
        canClick = false;
        const q = quizData[idx];
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        
        if(selected === q.a) {
            btn.classList.add('correct-flash');
            score++;
            const anim = document.getElementById('score-anim');
            anim.classList.add('show');
            setTimeout(() => anim.classList.remove('show'), 1000);
        } else {
            btn.classList.add('wrong-flash');
            document.querySelectorAll('.option-btn').forEach(b => {
                if(b.innerText === q.a) b.classList.add('correct-flash');
            });
        }
        
        setTimeout(() => {
            idx++;
            if(idx < totalQ) renderQ(); else finish();
        }, 1500);
    }

    function finish() {
        document.getElementById('game-panel').style.display='none';
        document.getElementById('result-panel').style.display='block';
        document.getElementById('final-p').innerText = `${score} / ${totalQ}`;
        
        const titles = { 
            low: ["Menni fog ez jobban is!", "Gyakorlat teszi a mestert!", "Ne add fel!"],
            mid: ["Nem rossz!", "Alakul ez!", "Szép próbálkozás!"],
            good: ["Ügyes voltál!", "Szép eredmény!", "Jó formában vagy!"],
            high: ["Átlagon felüli!", "Nagyszerű teljesítmény!", "Profi vagy!"],
            perfect: ["Zseniális!", "Tökéletes tudás!", "Mesterfok!"]
        };
        
        let badgeImg = "", league = "", cls = "", cat = "low";
        
        if(score <= 4) { badgeImg = "img/bronze.png"; league = "Bronz"; cls = "bronz"; cat = "low"; }
        else if(score <= 9) { badgeImg = "img/silver.png"; league = "Ezüst"; cls = "ezust"; cat = "mid"; }
        else if(score <= 14) { badgeImg = "img/gold.png"; league = "Arany"; cls = "arany"; cat = score >= 11 ? "high" : "good"; }
        else { badgeImg = "img/diamond.png"; league = "Gyémánt"; cls = "gyemant"; cat = "perfect"; }
        
        const randomMsg = titles[cat][Math.floor(Math.random() * titles[cat].length)];
        document.getElementById('result-msg').innerText = randomMsg;
        document.getElementById('badge-img').src = badgeImg;
        document.getElementById('league-text').innerText = league;
        document.getElementById('league-text').className = "league-name " + cls;
    }

    loadQuiz();
</script>
</body>
</html>
