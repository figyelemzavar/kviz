<!DOCTYPE html>
<html lang="hu">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-275XYFWD28"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-275XYFWD28');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KvízParti - Napi Kihívás</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5; --secondary: #10b981; --error: #ef4444;
            --bg: #f3f4f6; --text: #1f2937; --card: #ffffff;
            --fb: #1877F2;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .ad-banner { display: none; width: 100%; max-width: 728px; height: 90px; background: #e5e7eb; align-items: center; justify-content: center; color: #9ca3af; font-size: 12px; margin-bottom: 20px; border: 1px dashed #d1d5db; }
        .ad-sidebar { display: none; width: 160px; height: 600px; background: #e5e7eb; align-items: center; justify-content: center; color: #9ca3af; font-size: 12px; border: 1px dashed #d1d5db; }
        
        @media (min-width: 1100px) { .ad-sidebar { display: none; } }

        .main-layout { display: flex; gap: 20px; justify-content: center; width: 100%; max-width: 1000px; }
        .quiz-container { width: 100%; max-width: 450px; position: relative; }
        .card { background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(0,0,0,0.1); position: relative; }
        .live-score-tag { background: var(--primary); color: white; padding: 5px 15px; border-radius: 12px; font-weight: 800; font-size: 14px; }
        .progress-text { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 8px; font-weight: 600; color: #6b7280; }
        .bar-bg { height: 8px; background: #e5e7eb; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.4s; }
        .difficulty-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; color: white; margin-bottom: 10px; text-transform: uppercase; }
        
        .option-btn { background: #fff; border: 2px solid #f3f4f6; padding: 16px; border-radius: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; width: 100%; font-family: inherit; font-size: 16px; position: relative; overflow: visible; }
        .correct-flash { background: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        .wrong-flash { background: var(--error) !important; color: white !important; border-color: var(--error) !important; animation: shake 0.3s; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
        
        .score-float { position: absolute; color: var(--secondary); font-weight: 800; font-size: 24px; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 100; left: 50%; transform: translateX(-50%); }
        @keyframes floatUp { 0% { opacity: 1; bottom: 20px; } 100% { opacity: 0; bottom: 80px; } }

        .start-btn { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .fb-btn { background: var(--fb); color: white; border: none; padding: 15px; width: 100%; border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ad-banner">Hirdetés (728x90)</div>
    <div class="main-layout">
        <div class="ad-sidebar">Hirdetés (160x600)</div>
        <div class="quiz-container">
            <div id="start-panel" class="card">
                <span id="theme-display" style="color:var(--primary); font-weight:800; text-transform:uppercase;">NAPI FORDULÓ</span>
                <h1 style="margin: 10px 0;">KvízParti</h1>
                <p id="time-info" style="font-size: 14px; color: #6b7280; margin-bottom: 25px;">Töltsd fel a tudásodat!</p>
                <button class="start-btn" onclick="startQuiz()">JÁTÉK INDÍTÁSA</button>
            </div>
            <div id="game-panel" class="card" style="display:none;">
                <div class="progress-text"><span id="q-count">1 / 15</span><div class="live-score-tag">Pont: <span id="live-score">0</span></div></div>
                <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
                <div id="diff-tag" class="difficulty-tag">SZINT</div>
                <h2 id="q-text" style="font-size: 19px; margin-bottom: 25px;">Kérdés?</h2>
                <div id="options-box" style="position: relative;"></div>
            </div>
            <div id="result-panel" class="card" style="display:none;">
                <h1 style="color:var(--secondary)">Szép munka!</h1>
                <div style="font-size:60px; font-weight:800; color:var(--primary); margin: 20px 0;" id="final-p">0</div>
                <p style="font-weight: 600; color: #6b7280;">GRATULÁLUNK!</p>
                <button class="fb-btn" onclick="window.location.reload()">ÚJ JÁTÉK</button>
            </div>
        </div>
        <div class="ad-sidebar">Hirdetés (160x600)</div>
    </div>

<script>
    let quizData = [];
    let idx = 0, score = 0, canClick = true;
    const totalQ = 15;
    const colorPrimaryVar = "#4f46e9"; 
    const diffColors = { "Könnyű": "#10b981", "Közepes": "#f59e0b", "Nehéz": "#ef4444" };
    const diffOrder = { "Könnyű": 1, "Közepes": 2, "Nehéz": 3 };

    async function loadQuiz() {
        try {
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const hour = now.getHours();

            const response = await fetch(`data_${dateStr}.json?t=${new Date().getTime()}`);
            if(!response.ok) throw new Error("Hiba");
            
            const encrypted = await response.text();
            const bytes = CryptoJS.AES.decrypt(encrypted, colorPrimaryVar);
            const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
            const dailyData = JSON.parse(decryptedText);

            let activeSlot = null;
            const slots = [18, 16, 14, 12, 10, 8];
            for (let s of slots) { if (hour >= s) { activeSlot = s.toString().padStart(2, '0'); break; } }

            if (activeSlot && dailyData.slots[activeSlot]) {
                quizData = dailyData.slots[activeSlot].sort((a, b) => diffOrder[a.l] - diffOrder[b.l]);
                document.getElementById('theme-display').innerText = "NAPI FORDULÓ";
                document.getElementById('time-info').innerText = `Aktuális idősáv: ${activeSlot}:00`;
            } else {
                document.getElementById('theme-display').innerText = "VÁRAKOZÁS";
                document.querySelector('.start-btn').style.display = "none";
            }
        } catch (e) {
            document.getElementById('theme-display').innerText = "HAMAROSAN...";
            document.querySelector('.start-btn').style.display = "none";
        }
    }

    function startQuiz() {
        if(quizData.length === 0) return;
        document.getElementById('start-panel').style.display = 'none';
        document.getElementById('game-panel').style.display = 'block';
        renderQ();
    }

    function renderQ() {
        canClick = true;
        const q = quizData[idx];
        document.getElementById('q-count').innerText = `${idx + 1} / ${totalQ}`;
        document.getElementById('live-score').innerText = score;
        document.getElementById('bar').style.width = `${((idx + 1) / totalQ) * 100}%`;
        const tag = document.getElementById('diff-tag');
        tag.innerText = q.l;
        tag.style.background = diffColors[q.l];
        document.getElementById('q-text').innerText = q.q;
        
        // VÁLASZOK MEKKEVERÉSE (Shuffle)
        const shuffledOptions = [...q.o].sort(() => Math.random() - 0.5);
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        shuffledOptions.forEach((txt) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(txt, b);
            box.appendChild(b);
        });
    }

    function check(selected, btn) {
        if(!canClick) return; 
        canClick = false;
        const q = quizData[idx];
        let gainedPoints = 0;
        
        if(selected === q.a) {
            btn.classList.add('correct-flash');
            if(q.l === "Könnyű") gainedPoints = 10; 
            else if(q.l === "Közepes") gainedPoints = 20; 
            else gainedPoints = 30;
            
            score += gainedPoints;
            document.getElementById('live-score').innerText = score; 
            showPoints(btn, gainedPoints);
        } else {
            btn.classList.add('wrong-flash');
            document.querySelectorAll('.option-btn').forEach(b => { 
                if(b.innerText === q.a) b.classList.add('correct-flash'); 
            });
        }
        
        setTimeout(() => {
            idx++;
            if(idx < totalQ && idx < quizData.length) renderQ();
            else finish();
        }, 1200);
    }

    function showPoints(parent, pts) {
        const float = document.createElement('div');
        float.className = 'score-float';
        float.innerText = `+${pts}`;
        parent.appendChild(float);
        setTimeout(() => float.remove(), 1000);
    }

    function finish() {
        document.getElementById('game-panel').style.display = 'none';
        document.getElementById('result-panel').style.display = 'block';
        document.getElementById('final-p').innerText = score;
    }

    loadQuiz();
</script>
</body>
</html>
